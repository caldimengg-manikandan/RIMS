user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    upstream frontend {
        server frontend_blue:3000;
    }

    upstream backend {
        server backend_blue:10000;
    }

    server {
        listen 80;
        server_name caldimproducts.com;

        # Redirect root to subpath (Optional, but helpful)
        location = / {
            return 301 /calrims/;
        }

        # Frontend Routes under /calrims/
        location /calrims/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Backend API Routes under /calrims/api/
        location /calrims/api/ {
            # Strip the /calrims/api/ prefix and pass to backend
            rewrite ^/calrims/api/(.*) /api/$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket Routes under /calrims/ws/
        location /calrims/ws/ {
            rewrite ^/calrims/ws/(.*) /ws/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
