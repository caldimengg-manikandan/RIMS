<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Complete</title>

```
<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons (Lucide equivalent via CDN) -->
<script src="https://unpkg.com/lucide@latest"></script>
```

</head>

<body class="min-h-screen bg-[#f1f5f9] flex items-center justify-center p-6">

```
<div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl p-12 text-center border border-slate-200">

    <!-- Icon -->
    <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-8 border border-green-200">
        <i data-lucide="check-circle-2" class="w-12 h-12 text-green-600"></i>
    </div>

    <!-- Title -->
    <h1 class="text-4xl font-black text-slate-900 mb-4 tracking-tight">
        Interview Complete
    </h1>

    <!-- Description -->
    <p class="text-slate-600 text-lg mb-10 leading-relaxed">
        Excellent work! Your responses have been captured and are being analyzed by our AI system. Our HR team will review your report shortly.
    </p>

    <!-- Buttons -->
    <div class="grid grid-cols-2 gap-4">

        <button
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold h-14 rounded-2xl shadow-lg shadow-blue-500/20"
            onclick="goToJobs()"
        >
            Back to Jobs Page
        </button>

        <button
            class="font-bold h-14 rounded-2xl border-2 border-gray-300"
            onclick="giveFeedback()"
        >
            Give Feedback
        </button>

    </div>
</div>

<script>
    lucide.createIcons();

    function goToJobs() {
        window.location.href = "/jobs";
    }

    function giveFeedback() {
        alert("Open feedback dialog");
    }
</script>
```

</body>
</html>
