version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80" # Map host 9999 to container 80 (Avoids system port 80 conflict)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend_blue
      - backend_blue
    restart: always

  # --- BLUE ENVIRONMENT ---
  frontend_blue:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims/api
    restart: always

  backend_blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      - ENV=production
      - BACKEND_START_MODE=docker
    restart: always

  # --- GREEN ENVIRONMENT ---
  frontend_green:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims/api
    restart: always

  backend_green:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      - ENV=production
      - BACKEND_START_MODE=docker
    restart: always
