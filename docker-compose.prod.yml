version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims/api
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "10000:10000"
    env_file: ./backend/.env
    environment:
      - ENV=production
    restart: always
