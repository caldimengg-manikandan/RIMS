version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend_blue
      - backend_blue
    restart: always

  # --- BLUE ENVIRONMENT ---
  frontend_blue:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/calrims"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  backend_blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      - ENV=production
      - BACKEND_START_MODE=docker
      - FRONTEND_BASE_URL=https://caldimproducts.com/calrims
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  # --- GREEN ENVIRONMENT ---
  frontend_green:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/calrims"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  backend_green:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      - ENV=production
      - BACKEND_START_MODE=docker
      - FRONTEND_BASE_URL=https://caldimproducts.com/calrims
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always
