version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    restart: always

  frontend_blue: &frontend
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./frontend/.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims/api
    restart: always

  frontend_green:
    <<: *frontend

  backend_blue: &backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      - ENV=production
    restart: always

  backend_green:
    <<: *backend
