<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee ID Card</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg: #ffffff;
        }

        @page {
            size: 85.6mm 54mm; /* Standard ID-1 CR80 size */
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: white;
            -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        }

        .id-card {
            width: 85.6mm;
            height: 54mm;
            position: relative;
            overflow: hidden;
            background: var(--bg);
            display: flex;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            box-sizing: border-box;
        }

        /* Side Strip for Branding */
        .side-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 6mm;
            height: 100%;
            background: var(--primary);
            z-index: 5;
        }

        .main-content {
            flex: 1;
            margin-left: 6mm;
            padding: 12px 15px;
            z-index: 10;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            position: relative;
        }

        .left-info {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
            padding-right: 10px;
        }

        .right-photo {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 32mm;
            gap: 6px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .logo {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .company-name {
            font-weight: 800;
            font-size: 9pt;
            letter-spacing: -0.3px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .user-details {
            margin-top: 5px;
        }

        .user-name {
            font-size: 13pt;
            font-weight: 800;
            margin: 2px 0;
            color: var(--primary);
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        .user-role {
            font-size: 7.5pt;
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 6px;
        }

        .info-item {
            display: flex;
            gap: 8px;
            align-items: baseline;
        }

        .info-label {
            font-size: 5.5pt;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            min-width: 45px;
        }

        .info-value {
            font-size: 7pt;
            font-weight: 600;
            color: var(--text-main);
        }

        .photo-container {
            width: 25mm;
            height: 32mm;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .employee-id-box {
            background: var(--primary);
            color: white;
            font-size: 7pt;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 3px;
            text-align: center;
            min-width: 70px;
        }

        .status-line {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
        }

        .watermark {
            font-size: 4.5pt;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="id-card">
        <div class="side-strip"></div>
        <div class="main-content">
            <div class="left-info">
                <div class="header">
                    {% if logo_url %}
                    <img src="{{ logo_url }}" class="logo" alt="Logo">
                    {% endif %}
                    <span class="company-name">{{ company_name }}</span>
                </div>
                
                <div class="user-details">
                    <div class="user-role">{{ job_role }}</div>
                    <h1 class="user-name">{{ candidate_name }}</h1>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">Dept</span>
                            <span class="info-value">{{ department }}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Joined</span>
                            <span class="info-value">{{ joining_date }}</span>
                        </div>
                    </div>
                </div>

                <div class="watermark">
                    VALID EMPLOYEE IDENTITY CARD
                </div>
            </div>

            <div class="right-photo">
                <div class="photo-container">
                    {% if photo_url %}
                    <img src="{{ photo_url }}" class="photo" alt="Candidate">
                    {% else %}
                    <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-center; background: #f1f5f9;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" style="width: 50%; height: 50%;">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    {% endif %}
                </div>
                <div class="employee-id-box">{{ employee_id }}</div>
            </div>
        </div>
        <div class="status-line"></div>
    </div>
</body>
</html>
