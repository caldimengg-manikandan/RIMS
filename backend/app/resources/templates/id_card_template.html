<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee ID Card</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg: #f8fafc;
        }

        @page {
            size: 85.6mm 54mm; /* Standard ID-1 CR80 size */
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: white;
            -webkit-print-color-adjust: exact;
        }

        .id-card {
            width: 85.6mm;
            height: 54mm;
            position: relative;
            overflow: hidden;
            background: var(--bg);
            display: flex;
            color: var(--text-main);
        }

        /* Decorative Background */
        .id-card::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 60%;
            height: 140%;
            background: var(--primary);
            transform: skew(-15deg);
            z-index: 1;
        }

        .left-content {
            flex: 1;
            padding: 15px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .right-content {
            width: 35%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-right: 10px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .company-name {
            font-weight: 800;
            font-size: 10pt;
            letter-spacing: -0.5px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .user-details {
            margin-top: 10px;
        }

        .user-name {
            font-size: 14pt;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
            line-height: 1.1;
        }

        .user-role {
            font-size: 8pt;
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-top: 10px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 5pt;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 7pt;
            font-weight: 600;
        }

        .photo-container {
            width: 28mm;
            height: 35mm;
            background: white;
            border: 2px solid white;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .employee-id {
            background: var(--primary);
            color: white;
            font-size: 7pt;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            margin-top: 8px;
            text-align: center;
        }

        .status-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
        }

        /* Back side simulation overlay (optional) */
        .watermark {
            position: absolute;
            bottom: 10px;
            left: 15px;
            font-size: 4pt;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="id-card">
        <div class="left-content">
            <div class="header">
                {% if logo_url %}
                <img src="{{ logo_url }}" class="logo" alt="Logo">
                {% endif %}
                <span class="company-name">{{ company_name }}</span>
            </div>
            
            <div class="user-details">
                <div class="user-role">{{ job_role }}</div>
                <h1 class="user-name">{{ candidate_name }}</h1>
                
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Department</span>
                        <span class="info-value">{{ department }}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Joining Date</span>
                        <span class="info-value">{{ joining_date }}</span>
                    </div>
                </div>
            </div>

            <div class="watermark">
                ELECTRONIC IDENTITY CARD | SYSTEM GENERATED
            </div>
        </div>

        <div class="right-content">
            <div class="photo-container">
                {% if photo_url %}
                <img src="{{ photo_url }}" class="photo" alt="Candidate">
                {% else %}
                <div style="font-size: 6pt; color: #ccc;">PHOTO MISSING</div>
                {% endif %}
            </div>
            <div class="employee-id">{{ employee_id }}</div>
        </div>

        <div class="status-badge"></div>
    </div>
</body>
</html>
