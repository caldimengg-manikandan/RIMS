[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:warnings
# Exclude heavy integration tests that require real external services
markers =
    unit: Pure unit tests (no DB, no HTTP)
    integration: Tests requiring a running server/DB
    e2e: End-to-end tests requiring full stack
